<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXEM 아이스브레이킹</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Pretendard',system-ui,sans-serif;font-weight:400;background:#f0f6ff}
:root{
  --acc:#40E2FF;--acc-dark:#00bcd4;--acc-deep:#0099b3;
  --text:#111827;--sub:#4b5563;--muted:#9ca3af;
  --border:#e5e7eb;--white:#ffffff;
  --dot:#00bcd4;--dot-light:#80deea;--line:#b2dfdb
}

/* ── TOP BAR ── */
.top-bar{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:.9rem 1.5rem;
  background:rgba(240,246,255,0.85);backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(64,226,255,0.12)
}
.top-right{display:flex;align-items:center;gap:10px}
.cnt-pill{font-size:12px;color:var(--sub);background:rgba(0,188,212,0.1);
  border:1px solid rgba(64,226,255,0.3);border-radius:20px;padding:4px 12px;font-weight:500}
.prog-wrap{width:120px;height:4px;background:#ddd;border-radius:999px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--dot),var(--dot-light));
  border-radius:999px;transition:width .6s cubic-bezier(.4,0,.2,1)}

/* ── START SCREEN ── */
.start-screen{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;padding:2rem;gap:2rem;text-align:center
}
.start-bubble{
  background:#fff;border-radius:32px;padding:2.8rem 2.4rem;
  box-shadow:0 8px 40px rgba(0,0,0,0.08);
  border:1.5px solid rgba(0,0,0,0.06);
  display:flex;flex-direction:column;align-items:center;gap:1.4rem;
  max-width:420px;width:100%;position:relative;overflow:hidden
}
.start-title{font-size:24px;font-weight:600;line-height:1.35;color:var(--text);letter-spacing:-.3px}
.start-title span{color:var(--dot)}
.start-desc{font-size:13px;color:var(--sub);line-height:1.9;font-weight:400}
.start-btn{
  background:var(--dot);border:none;border-radius:14px;padding:13px 28px;
  font-size:14px;font-weight:600;color:#fff;cursor:pointer;font-family:'Pretendard',sans-serif;
  box-shadow:0 4px 18px rgba(64,226,255,0.35);transition:all .2s;width:100%
}
.start-btn:hover{background:#0097a7;transform:translateY(-2px)}
.start-btn.ghost{
  background:#fff;border:1.5px solid var(--border);color:var(--sub);box-shadow:none
}
.guide-steps{
  display:flex;flex-direction:column;gap:10px;width:100%;
  background:#f0f8ff;border:1.5px solid rgba(0,0,0,0.06);border-radius:16px;padding:1.1rem 1.2rem
}
.guide-step{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--sub);line-height:1.5}
.guide-num{
  width:22px;height:22px;border-radius:50%;background:rgba(64,226,255,0.15);color:var(--dot);
  font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0
}

/* ── ORDER SCREEN ── */
.order-screen{
  display:flex;flex-direction:column;align-items:center;
  min-height:100vh;padding:5rem 1.5rem 2rem;
  width:100%;max-width:480px;margin:0 auto;gap:1rem;overflow-y:auto
}
.order-title{font-size:20px;font-weight:600;letter-spacing:-.3px;text-align:center;color:var(--text)}
.order-sub{font-size:13px;color:var(--sub);text-align:center;line-height:1.7}
.name-input-row{display:flex;gap:8px;width:100%}
.name-input{
  flex:1;background:#fff;border:1.5px solid var(--border);border-radius:12px;
  padding:11px 14px;font-size:14px;color:var(--text);outline:none;
  font-family:'Pretendard',sans-serif;transition:border-color .15s
}
.name-input:focus{border-color:var(--dot)}
.add-btn{
  background:var(--dot);border:none;border-radius:12px;width:44px;height:44px;
  font-size:22px;color:#fff;cursor:pointer;flex-shrink:0
}
.name-list{display:flex;flex-direction:column;gap:7px;width:100%}
.name-chip{
  background:#fff;border:1.5px solid var(--border);border-radius:11px;
  padding:10px 14px;display:flex;align-items:center;justify-content:space-between;
  font-size:14px;font-weight:500;color:var(--text)
}
.chip-num{
  width:24px;height:24px;border-radius:50%;background:rgba(0,188,212,0.1);color:var(--dot);
  font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center
}
.del-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;padding:2px 6px}
.del-btn:hover{color:#ef4444}
.shuffle-order-btn{
  background:rgba(64,226,255,0.1);border:1.5px solid rgba(64,226,255,0.35);border-radius:12px;
  padding:11px 20px;font-size:14px;font-weight:600;color:var(--dot);cursor:pointer;
  font-family:'Pretendard',sans-serif;transition:all .18s;display:none;
  align-items:center;gap:8px;width:100%;justify-content:center
}
.shuffle-order-btn:hover{background:rgba(64,226,255,0.15)}
.order-result{
  width:100%;background:#fff;border:1.5px solid rgba(64,226,255,0.25);border-radius:14px;
  padding:1rem 1.4rem;display:none;flex-direction:column;gap:9px
}
.order-result-title{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--dot);font-weight:600}
.order-item{display:flex;align-items:center;gap:12px;font-size:14px;font-weight:500;color:var(--text);animation:slideIn .3s both}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
.order-badge{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.ob1{background:rgba(64,226,255,0.15);color:var(--dot)}.ob2{background:#f3f4f6;color:var(--muted)}
.first-tag{font-size:11px;color:var(--dot);font-weight:600;background:rgba(0,188,212,0.1);border-radius:6px;padding:2px 8px;margin-left:4px}
.back-link{background:none;border:none;font-size:13px;color:var(--muted);cursor:pointer;font-family:'Pretendard',sans-serif}
.back-link:hover{color:var(--text)}

/* ══════════════════════════════════════ */
/* ── STEP TIMELINE QUIZ SCREEN ──       */
/* ══════════════════════════════════════ */
.quiz-scroll{
  width:100%;min-height:100vh;
  padding:5rem 0 4rem;
  overflow-y:auto;overflow-x:hidden
}
.timeline{
  position:relative;
  width:100%;max-width:700px;
  margin:0 auto;
  padding:2rem 1.5rem
}

/* ── Vertical snake line (SVG path drawn in JS) ── */
.timeline-svg{
  position:absolute;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:0
}
.timeline-svg path{
  fill:none;stroke:var(--line);stroke-width:2;stroke-linecap:round
}

/* ── STEP ITEM ── */
.step{
  position:relative;
  display:flex;align-items:flex-start;gap:1rem;
  margin-bottom:2.5rem;
  z-index:2;
  opacity:0.35;
  transition:opacity .4s, transform .4s;
  cursor:pointer
}
.step:hover{opacity:0.6}
.step.active{opacity:1;transform:scale(1.01)}
.step.done{opacity:0.5}

/* Alternate sides */
.step.right{flex-direction:row}
.step.left{flex-direction:row-reverse}

/* ── Circle ── */
.step-circle{
  width:80px;height:80px;border-radius:50%;
  background:var(--dot);
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;font-weight:700;color:#fff;
  transition:all .4s;
}
.step.active .step-circle{
  width:100px;height:100px;
}
.step.done .step-circle{
  background:var(--dot-light);
}
.step-circle-wrap{
  display:flex;flex-direction:column;align-items:center;gap:16px;flex-shrink:0
}
.step-box{
  background:#fff;border-radius:16px;padding:1.2rem 1.4rem;
  box-shadow:0 2px 12px rgba(0,0,0,0.05);
  border:1px solid rgba(0,0,0,0.04);
  margin-bottom:4px
}
.step-box .q-row{
  display:flex;align-items:center;gap:8px
}
.step.right .step-box .q-row{flex-direction:row}
.step.left .step-box .q-row{flex-direction:row-reverse}
.q-row .step-title{flex:1;margin-bottom:0}
.step-box .q-sub{
  font-size:13px;color:var(--sub);line-height:1.6;
  margin-top:8px;padding-top:8px;border-top:1px solid #f0f0f0
}
.inline-timer{
  display:inline-flex;align-items:center;gap:4px;
  flex-shrink:0
}
.inline-timer-num{
  font-size:12px;font-weight:600;color:var(--muted);font-variant-numeric:tabular-nums
}
.inline-timer-num.warn{color:#ef4444}
.step-next-btn{
  background:transparent;border:1.5px solid var(--dot);border-radius:10px;
  padding:10px 0;width:80px;font-size:12px;font-weight:600;color:var(--dot);text-align:center;
  cursor:pointer;font-family:'Pretendard',sans-serif;
  transition:all .18s;white-space:nowrap
}
.step-next-btn:hover{background:var(--dot);color:#fff;transform:translateY(-1px)}
.step.active .step-next-btn{width:100px}
.turn-tag-inline{
  display:inline-block;
  font-size:14px;font-weight:700;color:var(--acc-dark);
  background:linear-gradient(135deg,rgba(64,226,255,0.15),rgba(0,188,212,0.1));
  border:1.5px solid rgba(64,226,255,0.35);
  border-radius:10px;padding:6px 14px;margin-bottom:6px;
  letter-spacing:-.2px
}
.step.future .step-circle{
  background:#a6e4f0;
  box-shadow:none
}
.step.future .step-title{
  color:var(--muted);font-style:italic
}

/* ── Content ── */
.step-content{
  flex:1;padding-top:8px
}
.step-num{
  font-size:28px;font-weight:700;color:var(--dot);letter-spacing:-1px;
  margin-bottom:4px
}
.step.done .step-num{color:var(--dot-light)}
.step-title{
  font-size:17px;font-weight:600;color:var(--text);
  line-height:1.5;word-break:keep-all;margin-bottom:4px
}
.step-sub{font-size:13px;color:var(--sub);line-height:1.6}
.step.left .step-content{text-align:right}

/* ── Active step expanded card ── */
.step-card{
  margin-top:1rem;
  background:#fff;border-radius:20px;padding:1.5rem;
  box-shadow:0 4px 24px rgba(0,0,0,0.07);
  border:1.5px solid rgba(0,0,0,0.06);
  animation:cardIn .35s cubic-bezier(.34,1.4,.64,1)
}
@keyframes cardIn{from{opacity:0;transform:translateY(10px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}

.step-card .turn-tag{
  display:flex;align-items:center;justify-content:center;gap:6px;
  font-size:16px;font-weight:700;color:#fff;
  background:linear-gradient(135deg,var(--acc),var(--acc-dark));
  border-radius:12px;
  padding:10px 18px;margin-bottom:.8rem;
  box-shadow:0 4px 16px rgba(64,226,255,0.35);
  letter-spacing:-.3px
}

/* Timer in card */
.card-timer{
  display:flex;align-items:center;gap:10px;margin-top:1rem;
  padding-top:.8rem;border-top:1px solid #e0f0f8
}
.card-timer-ring{position:relative;width:40px;height:40px;flex-shrink:0}
.card-timer-ring svg{transform:rotate(-90deg)}
.card-timer-num{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:600;color:var(--text)
}
.card-timer-num.warn{color:#ef4444}
.card-timer-label{font-size:12px;color:var(--muted)}
.card-timer-done{font-size:12px;color:#16a34a;font-weight:600}

/* Choices in card */
.card-choices{display:flex;flex-direction:column;gap:6px;margin-top:.8rem}
.card-ch-btn{
  width:100%;padding:10px 14px;
  background:#f0f8ff;border:1.5px solid #d0e8f0;border-radius:12px;
  font-size:13px;font-weight:500;color:var(--text);cursor:pointer;
  transition:all .18s;text-align:left;display:flex;align-items:center;gap:10px;
  font-family:'Pretendard',sans-serif
}
.card-ch-btn:hover{border-color:var(--dot);background:rgba(64,226,255,0.06)}
.card-ch-btn.selected{border-color:var(--dot);background:rgba(64,226,255,0.1);color:var(--dot)}
.card-ch-dot{width:6px;height:6px;border-radius:50%;background:#ccc;flex-shrink:0;transition:all .18s}
.card-ch-btn.selected .card-ch-dot{background:var(--dot);box-shadow:0 0 6px rgba(196,92,74,0.5)}
.card-reaction{
  background:rgba(64,226,255,0.08);border:1.5px solid rgba(64,226,255,0.2);
  border-radius:14px;padding:.7rem 1rem;font-size:12px;color:var(--dot);
  line-height:1.6;text-align:center;font-weight:500;margin-top:.6rem
}

/* ── NAV at bottom ── */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:center;gap:12px;
  padding:1rem 1.5rem;
  background:rgba(240,246,255,0.9);backdrop-filter:blur(12px);
  border-top:1px solid rgba(0,0,0,0.06)
}
.bottom-nav button{
  height:44px;border:none;border-radius:14px;
  font-size:14px;font-weight:600;cursor:pointer;
  font-family:'Pretendard',sans-serif;transition:all .18s
}
.btn-prev{
  width:44px;background:#fff;border:1.5px solid var(--border) !important;
  color:var(--muted);font-size:18px
}
.btn-prev:hover{border-color:var(--dot) !important;color:var(--dot)}
.btn-prev:disabled{opacity:.25;pointer-events:none}
.btn-next{
  flex:1;max-width:400px;background:var(--dot);color:#fff;
  box-shadow:0 4px 16px rgba(64,226,255,0.35)
}
.btn-next:hover{background:#0097a7;transform:translateY(-1px)}

/* ── FINISH ── */
.finish-screen{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;gap:1.6rem;padding:2rem;text-align:center
}
.finish-bubble{
  background:#fff;border-radius:32px;padding:2.8rem 2.4rem;
  box-shadow:0 8px 40px rgba(0,0,0,0.08);
  border:1.5px solid rgba(0,0,0,0.06);
  display:flex;flex-direction:column;align-items:center;gap:1.2rem;max-width:380px;width:100%
}
.finish-icon{font-size:56px;animation:bounce .8s cubic-bezier(.34,1.56,.64,1)}
@keyframes bounce{from{transform:scale(0)}to{transform:scale(1)}}
.finish-t{font-size:22px;font-weight:600;letter-spacing:-.3px;color:var(--text)}
.finish-s{font-size:13px;color:var(--sub);line-height:1.9;max-width:260px}
.finish-btn{
  background:var(--dot);border:none;border-radius:13px;padding:13px 28px;
  font-size:14px;font-weight:600;color:#fff;cursor:pointer;font-family:'Pretendard',sans-serif;
  box-shadow:0 4px 18px rgba(64,226,255,0.35);transition:all .18s;width:100%
}
.finish-btn:hover{background:#0097a7;transform:translateY(-1px)}
</style>
</head>

<div id="app"></div>

  {n:26,main:"나의 취미를 딱 한 줄로 소개한다면?",sub:"그 취미를 시작하게 된 계기가 있나요?",type:"open"},
  {n:27,main:"마지막으로, 오늘 이 자리에서 새로 알게 된 것이 있다면?",sub:"오늘 누군가에 대해 놀랍거나 새로웠던 점을 나눠주세요 :)",type:"open"},
  {n:28,main:"평생 딱 하나의 음식만 먹어야 한다면?",sub:"그 음식을 고른 이유도 알려주세요!",type:"open"}
];

const shuffledIdx=[...Array(Q.length).keys()];
for(let i=shuffledIdx.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[shuffledIdx[i],shuffledIdx[j]]=[shuffledIdx[j],shuffledIdx[i]];}

const TIMER_SEC=60;
let st={screen:'start',cur:0,sel:null,showReact:false,timerLeft:TIMER_SEC,timerActive:false,names:[],orderResult:[],turnIdx:0};
let timerIv=null;
const app=document.getElementById('app');

function curQ(){return Q[shuffledIdx[st.cur]];}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function startAutoTimer(){
  clearInterval(timerIv);st.timerLeft=TIMER_SEC;st.timerActive=true;
  timerIv=setInterval(()=>{
    if(!st.timerActive){clearInterval(timerIv);return;}
    st.timerLeft=Math.max(0,st.timerLeft-1);
    if(st.timerLeft===0){clearInterval(timerIv);st.timerActive=false;}
    updateTimerDOM();
  },1000);
}
function stopTimer(){clearInterval(timerIv);st.timerActive=false;}
function updateTimerDOM(){
  const s=st.timerLeft,r=12,circ=2*Math.PI*r;
  const fg=document.getElementById('t-fg');
  const num=document.getElementById('t-num');
  const stroke=s<=10?'#ef4444':s<=20?'#f59e0b':'var(--dot)';
  if(fg){fg.style.strokeDasharray=circ;fg.style.strokeDashoffset=circ*(1-s/TIMER_SEC);fg.style.stroke=stroke;}
  if(num){num.textContent=s+'s';num.className='inline-timer-num'+(s<=10?' warn':'');}
}

function goNext(){
  stopTimer();
  if(st.cur>=Q.length-1){st.screen='finish';render();return;}
  st.cur++;st.sel=null;st.showReact=false;
  if(st.orderResult.length)st.turnIdx=(st.turnIdx+1)%st.orderResult.length;
  render();startAutoTimer();
}
function goPrev(){
  if(st.cur===0)return;
  stopTimer();st.cur--;st.sel=null;st.showReact=false;
  if(st.orderResult.length)st.turnIdx=(st.turnIdx-1+st.orderResult.length)%st.orderResult.length;
  render();startAutoTimer();
}

function addName(){
  const inp=document.getElementById('name-inp');if(!inp)return;
  const v=inp.value.trim();if(!v)return;
  st.names=[...st.names,v];inp.value='';inp.focus();renderNameList();
}
function handleNameKey(e){if(e.key==='Enter'&&!e.isComposing){e.preventDefault();addName();}}
function delName(i){st.names=st.names.filter((_,idx)=>idx!==i);st.orderResult=[];renderNameList();}
function renderNameList(){
  const nl=document.getElementById('name-list');const btn=document.getElementById('shuffle-order-btn');
  if(!nl)return;
  nl.innerHTML=st.names.map((n,i)=>`
    <div class="name-chip">
      <div style="display:flex;align-items:center;gap:10px">
        <div class="chip-num">${i+1}</div><span>${escHtml(n)}</span>
      </div>
      <button class="del-btn" onclick="delName(${i})">✕</button>
    </div>`).join('');
  if(btn)btn.style.display=st.names.length>=2?'flex':'none';
  renderOrderResult();
}
function shuffleOrder(){
  const arr=[...st.names];
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  st.orderResult=arr;renderOrderResult();
}
function renderOrderResult(){
  const el=document.getElementById('order-result');if(!el)return;
  if(!st.orderResult.length){el.style.display='none';return;}
  el.style.display='flex';
  el.innerHTML=`<div class="order-result-title">발표 순서</div>`+
    st.orderResult.map((n,i)=>`
      <div class="order-item" style="animation-delay:${i*0.06}s">
        <div class="order-badge ${i===0?'ob1':'ob2'}">${i+1}</div>
        <span>${escHtml(n)}</span>${i===0?'<span class="first-tag">첫 번째!</span>':''}
      </div>`).join('');
}

function selectChoice(i){
  st.sel=i;st.showReact=true;render();
  setTimeout(()=>goNext(),600);
}

function bindOrderEvents(){
  const inp=document.getElementById('name-inp');
  if(inp){inp.removeEventListener('keydown',handleNameKey);inp.addEventListener('keydown',handleNameKey);}
}

function render(){
  if(st.screen==='start'){app.innerHTML=rStart();return;}
  if(st.screen==='order'){app.innerHTML=rOrder();requestAnimationFrame(bindOrderEvents);return;}
  if(st.screen==='finish'){app.innerHTML=rFinish();return;}
  app.innerHTML=rQuiz();updateTimerDOM();
  // Scroll active step into view
  requestAnimationFrame(()=>{
    const el=document.querySelector('.step.active');
    if(el)el.scrollIntoView({behavior:'smooth',block:'center'});
  });
}

function rStart(){return`
<div class="start-screen">
  <div class="start-bubble">
    ${LOGO_LG}
    <div class="start-title">처음 만나는 순간을<br><span>조금 더 즐겁게!</span></div>
    <div class="start-desc">간단한 질문과 답변으로 서로를 알아가고<br>분위기를 자연스럽게 풀어가는 시간이에요 :)</div>
    <div class="guide-steps">
      <div class="guide-step"><div class="guide-num">1</div>먼저 참여자 이름을 입력하고 순서를 정해요</div>
      <div class="guide-step"><div class="guide-num">2</div>질문 하나에 <b>한 사람만</b> 답해요</div>
      <div class="guide-step"><div class="guide-num">3</div>다음 질문은 다음 사람 차례!</div>
    </div>
    <button class="start-btn" onclick="st.screen='order';render()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" style="vertical-align:-2px;margin-right:6px"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 014-4h4a4 4 0 014 4v2"/><circle cx="19" cy="7" r="3"/><path d="M21 21v-2a3 3 0 00-3-3"/></svg>순서 정하고 시작</button>
  </div>
</div>`;}

function rOrder(){return`
<div class="top-bar">${LOGO_SM}<button class="back-link" onclick="st.screen='start';render()">← 뒤로</button></div>
<div class="order-screen">
  <div class="order-title"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--dot)" stroke-width="2" stroke-linecap="round" style="vertical-align:-3px;margin-right:4px"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="8" cy="8" r="1.5"/><circle cx="16" cy="8" r="1.5"/><circle cx="8" cy="16" r="1.5"/><circle cx="16" cy="16" r="1.5"/><circle cx="12" cy="12" r="1.5"/></svg> 발표 순서 정하기</div>
  <div class="order-sub">이름을 입력하고 셔플하면 랜덤으로 순서를 배정해드려요!</div>
  <div class="name-input-row">
    <input class="name-input" id="name-inp" placeholder="이름 입력 후 Enter" autocomplete="off">
    <button class="add-btn" onclick="addName()">+</button>
  </div>
  <div class="name-list" id="name-list"></div>
  <button class="shuffle-order-btn" id="shuffle-order-btn" onclick="shuffleOrder()"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--dot)" stroke-width="2" stroke-linecap="round" style="vertical-align:-2px;margin-right:4px"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg> 순서 랜덤 배정!</button>
  <div class="order-result" id="order-result"></div>
  <button class="start-btn" onclick="if(!st.names.length){alert('참여자 이름을 먼저 입력해주세요!');return;}if(!st.orderResult.length)st.orderResult=[...st.names];st.turnIdx=0;st.screen='quiz';render();startAutoTimer()" style="margin-top:.5rem">질문 시작하기 →</button>
</div>`;}

function rQuiz(){
  const pct=((st.cur+1)/Q.length)*100;
  const s=st.timerLeft,r=17,circ=2*Math.PI*r;
  const stroke=s<=10?'#ef4444':s<=20?'#f59e0b':'var(--dot)';

  let steps='';
  for(let i=0;i<Q.length;i++){
    const q=Q[shuffledIdx[i]];
    const isActive=i===st.cur;
    const isDone=i<st.cur;
    const isFuture=i>st.cur;
    const side=i%2===0?'right':'left';
    const cls=`step ${side}${isActive?' active':''}${isDone?' done':''}${isFuture?' future':''}`;
    const turnName=st.orderResult.length?st.orderResult[i%st.orderResult.length]:'';

    if(isFuture){
      steps+=`
      <div class="${cls}">
        <div class="step-circle">${String(i+1).padStart(2,'0')}</div>
        <div class="step-content">

        </div>
      </div>`;
      continue;
    }

    let cardHtml='';
    if(isActive){
      let choiceHtml='';
      if(q.type==='choice'){
        choiceHtml=`<div class="card-choices">${q.opts.map((o,ci)=>`<button class="card-ch-btn${st.sel===ci?' selected':''}" onclick="selectChoice(${ci})"><span class="card-ch-dot"></span>${o}</button>`).join('')}</div>`;
        if(st.sel!==null&&q.reacts&&st.showReact){
          choiceHtml+=`<div class="card-reaction">${q.reacts[Math.min(st.sel,q.reacts.length-1)]}</div>`;
        }
        cardHtml=`
        <div class="step-card">
          ${choiceHtml}
        </div>`;
      }
    }

    let circleExtras='';
    if(isActive){
      circleExtras=`
        <button class="step-next-btn" onclick="event.stopPropagation();goNext()">${st.cur>=Q.length-1?'완료!':'다음 질문 →'}</button>`;
    }

    // 타이머를 질문 끝에 작게 표시
    const tr=12,tcirc=2*Math.PI*tr;
    let timerHtml='';
    if(isActive){
      timerHtml=`<span class="inline-timer"><svg width="28" height="28" viewBox="0 0 28 28"><circle fill="none" stroke="#d0e8f0" stroke-width="2" cx="14" cy="14" r="${tr}" style="transform:rotate(-90deg);transform-origin:center"/><circle fill="none" id="t-fg" stroke="${stroke}" stroke-width="2" stroke-linecap="round" cx="14" cy="14" r="${tr}" style="stroke-dasharray:${tcirc};stroke-dashoffset:${tcirc*(1-s/TIMER_SEC)};transform:rotate(-90deg);transform-origin:center"/></svg><span class="inline-timer-num${s<=10?' warn':''}" id="t-num">${s}s</span></span>`;
    }

    steps+=`
    <div class="${cls}" onclick="if(${i}<=${st.cur}){stopTimer();st.cur=${i};st.sel=null;st.showReact=false;st.turnIdx=${i}%Math.max(1,st.orderResult.length);render();startAutoTimer();}">
      <div class="step-circle-wrap">
        <div class="step-circle">${String(i+1).padStart(2,'0')}</div>
        ${circleExtras}
      </div>
      <div class="step-content">

        ${isActive&&turnName?`<div class="turn-tag-inline">${escHtml(turnName)}님 차례!</div>`:''}
        ${isActive?`<div class="step-box"><div class="q-row"><div class="step-title">${q.main}</div>${timerHtml}</div>${q.sub?`<div class="q-sub">${q.sub}</div>`:''}</div>`:`<div class="step-title">${q.main}</div>`}
        ${isActive&&q.type==='choice'?cardHtml:(!isActive?cardHtml:'')}
      </div>
    </div>`;
  }

  return`
<div class="top-bar">
  ${LOGO_SM}
  <div class="top-right">
    <div class="prog-wrap"><div class="prog-fill" style="width:${pct}%"></div></div>
    <span class="cnt-pill">${st.cur+1} / ${Q.length}</span>
  </div>
</div>
<div class="quiz-scroll">
  <div class="timeline">${steps}</div>
</div>
`;}

function rFinish(){return`
<div class="finish-screen">
  <div class="finish-bubble">
    <div class="finish-icon"><svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="var(--dot)" stroke-width="1.5" stroke-linecap="round"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2z"/></svg></div>
    <div class="finish-t">모든 질문 완료!</div>
    <div class="finish-s">오늘 이 자리를 통해 서로를<br>조금 더 알게 된 시간이었길 바라요.<br>함께해서 즐거웠어요 ✨</div>
    <button class="finish-btn" onclick="stopTimer();st={screen:'start',cur:0,sel:null,showReact:false,timerLeft:60,timerActive:false,names:[],orderResult:[],turnIdx:0};render()">처음으로 돌아가기</button>
  </div>
</div>`;}

render();
</script>
</body>
</html>
